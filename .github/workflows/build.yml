name: Build and Package PIX Activity

on:
  push:
    branches: [ "master", "dev" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '7.0.x'

      - name: Restore dependencies
        run: dotnet restore src/Activities.Custom.sln

      - name: Build project
        run: dotnet build src/Activities.Custom.sln --configuration Release --no-restore

      - name: Run Tests
        run: dotnet test src/Activities.Custom.sln --configuration Release --no-build --verbosity normal

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with: 
          name: PIX.Custom.Activities
          path: '**/bin/Release/**/*.nupkg'